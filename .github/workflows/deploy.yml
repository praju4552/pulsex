name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Build backend
        run: |
          cd backend-node
          npm install
          npm run build

      - name: Deploy Root Server Bootloader
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          source: "server.js"
          target: "~/domains/pulsewritexsolutions.com/"

      - name: Deploy Backend (primary - backendnode)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          source: "backend-node/dist,backend-node/prisma,backend-node/package.json,backend-node/package-lock.json"
          target: "~/domains/pulsewritexsolutions.com/backendnode"
          strip_components: 1

      - name: Deploy Backend (secondary - nodejs)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          source: "backend-node/dist,backend-node/prisma,backend-node/package.json,backend-node/package-lock.json"
          target: "~/domains/pulsewritexsolutions.com/nodejs/backend-node"
          strip_components: 1

      - name: Install deps and generate Prisma on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          script: |
            export PATH=/opt/alt/alt-nodejs22/root/usr/bin:$PATH
            cd ~/domains/pulsewritexsolutions.com/backendnode
            npm install --omit=dev
            ./node_modules/.bin/prisma generate || true
            chmod -R +x ./node_modules/.bin/ || true
            cd ~/domains/pulsewritexsolutions.com/nodejs/backend-node
            npm install --omit=dev
            ./node_modules/.bin/prisma generate || true
            chmod -R +x ./node_modules/.bin/ || true
            echo "Restarting Node.js..."
            killall -9 node || true

      - name: Verify deployed code on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          script: |
            echo "=== CHECKING ALL PATHS ==="
            echo "--- backendnode/dist/services/gerberParser.js (line with image.size) ---"
            grep -n "image.size" ~/domains/pulsewritexsolutions.com/backendnode/dist/services/gerberParser.js 2>/dev/null || echo "FILE NOT FOUND at backendnode path"
            echo "--- nodejs/backend-node/dist/services/gerberParser.js ---"
            grep -n "image.size" ~/domains/pulsewritexsolutions.com/nodejs/backend-node/dist/services/gerberParser.js 2>/dev/null || echo "FILE NOT FOUND at nodejs path"
            echo "--- backend-node/dist/services/gerberParser.js ---"
            grep -n "image.size" ~/domains/pulsewritexsolutions.com/backend-node/dist/services/gerberParser.js 2>/dev/null || echo "FILE NOT FOUND at backend-node path"
            echo "=== CHECKING server.js ==="
            cat ~/domains/pulsewritexsolutions.com/server.js 2>/dev/null || echo "server.js NOT FOUND"
            echo "=== CHECKING server-crash.log ==="
            cat ~/domains/pulsewritexsolutions.com/server-crash.log 2>/dev/null || echo "No crash log"
            echo "=== DIRECTORY LISTING ==="
            ls -la ~/domains/pulsewritexsolutions.com/ | head -20
            ls -la ~/domains/pulsewritexsolutions.com/backendnode/dist/services/ 2>/dev/null || echo "backendnode/dist/services/ not found"
            ls -la ~/domains/pulsewritexsolutions.com/nodejs/backend-node/dist/services/ 2>/dev/null || echo "nodejs/backend-node/dist/services/ not found"

      - name: Build Frontend
        env:
          VITE_API_URL: https://api.pulsewritexsolutions.com
          VITE_GOOGLE_CLIENT_ID: 835363988192-jr2ftrbtlklhui007gosnstjqca77m71.apps.googleusercontent.com
          VITE_RAZORPAY_KEY_ID: rzp_live_SUdncOeOPfYDuL
        run: |
          npm install
          npm run build

      - name: Deploy Frontend to Hostinger
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          source: "dist/*"
          target: "~/domains/pulsewritexsolutions.com/public_html"
          strip_components: 1
