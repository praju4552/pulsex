name: Deploy Antigravity to Hostinger

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: ⬇️ Checkout Code
      uses: actions/checkout@v4

    # 🟢 1. SETUP & BUILD BACKEND
    - name: ⚙️ Setup Node for Backend
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: 🔨 Build Backend
      run: |
        cd backend-node
        npm install
        npm run build

    - name: 🚀 Deploy Backend to Hostinger
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.HOSTINGER_SSH_HOST }}
        username: ${{ secrets.HOSTINGER_SSH_USER }}
        password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
        port: 65002
        source: "backend-node/dist,backend-node/prisma,backend-node/package.json,backend-node/package-lock.json"
        target: "~/domains/pulsewritexsolutions.com/backendnode"
        strip_components: 1

    # 🔵 2. SETUP & BUILD FRONTEND
    - name: ⚙️ Setup Node for Frontend
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: 🔨 Build Frontend
      env:
        VITE_API_URL: https://api.pulsewritexsolutions.com
        VITE_GOOGLE_CLIENT_ID: 835363988192-jr2ftrbtlklhui007gosnstjqca77m71.apps.googleusercontent.com
        VITE_RAZORPAY_KEY_ID: rzp_live_SUdncOeOPfYDuL
      run: |
        npm install
        npm run build

    - name: 🚀 Deploy Frontend to Hostinger
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.HOSTINGER_SSH_HOST }}
        username: ${{ secrets.HOSTINGER_SSH_USER }}
        password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
        port: 65002
        source: "dist/*,dist/.htaccess"
        target: "~/domains/pulsewritexsolutions.com/public_html"
        strip_components: 1
