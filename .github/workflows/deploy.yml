name: Deploy to Hostinger

# Fix 2: Only trigger manually — prevents accidental 503 from auto-deploys
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Setup Node
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version: '18'

      # ── BACKEND BUILD (on CI runner, not on Hostinger) ─────────────────────────
      - name: Build backend + generate Prisma client
        run: |
          cd backend-node
          npm install
          npm run build
          npx prisma generate
          npm install --omit=dev
          echo "=== Backend build complete ==="
          ls -la dist/ | head -10

      # ── FRONTEND BUILD ─────────────────────────────────────────────────────────
      - name: Build Frontend
        env:
          VITE_API_URL: https://api.pulsewritexsolutions.com
          VITE_GOOGLE_CLIENT_ID: 835363988192-jr2ftrbtlklhui007gosnstjqca77m71.apps.googleusercontent.com
          VITE_RAZORPAY_KEY_ID: rzp_live_SaYqVVu3DybnJx
        run: |
          npm install
          npm run build
          echo "=== Frontend built ==="
          ls -la dist/

      # ── UPLOAD BACKEND (dist + prisma + package.json) ──────────────────────────
      # Uses scp-action with strip_components to put files into backendnode/
      - name: Deploy Backend to Hostinger
        uses: appleboy/scp-action@a6e43c3aaf4e8e6b0b15bf34e19d71118f6b1ca7 # master
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          source: "backend-node/dist,backend-node/prisma,backend-node/package.json,backend-node/node_modules"
          target: "~/domains/pulsewritexsolutions.com/backendnode"
          strip_components: 1
          overwrite: true

      # ── WRITE server.js BOOTLOADER to nodejs/ via SSH ─────────────────────────
      # DO NOT use scp-action here — it uploads the entire workspace into nodejs/
      # Instead, write the minimal static server directly via SSH
      - name: Deploy server.js bootloader
        uses: appleboy/ssh-action@90162d1e4396c5c4b7671d60cae550a8b1ae1d0b # master
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          script: |
            cat > ~/domains/pulsewritexsolutions.com/nodejs/server.js << 'SRVEOF'
            const path = require('path');
            const fs   = require('fs');
            const http = require('http');
            const PUBLIC = path.join(__dirname, '..', 'public_html');
            const MIME = {
              '.html': 'text/html', '.css': 'text/css', '.js': 'application/javascript',
              '.png': 'image/png', '.jpg': 'image/jpeg', '.svg': 'image/svg+xml',
              '.ico': 'image/x-icon', '.woff2': 'font/woff2', '.json': 'application/json'
            };
            http.createServer((req, res) => {
              const urlPath = req.url.split('?')[0];
              let filePath = path.join(PUBLIC, urlPath);
              if (!filePath.startsWith(PUBLIC)) { res.writeHead(403); return res.end(); }
              if (fs.existsSync(filePath) && fs.statSync(filePath).isFile()) {
                const ext = path.extname(filePath);
                res.writeHead(200, { 'Content-Type': MIME[ext] || 'application/octet-stream' });
                res.end(fs.readFileSync(filePath));
              } else {
                try {
                  res.writeHead(200, { 'Content-Type': 'text/html' });
                  res.end(fs.readFileSync(path.join(PUBLIC, 'index.html')));
                } catch(e) {
                  res.writeHead(503, { 'Content-Type': 'text/html' });
                  res.end('<h1>PulseX is starting up...</h1>');
                }
              }
            }).listen(process.env.PORT || 3000, () => console.log('Static server running'));
            SRVEOF
            echo "server.js written to nodejs/"

      # ── UPLOAD FRONTEND (additive — does NOT delete existing files) ────────────
      - name: Deploy Frontend to Hostinger
        uses: appleboy/scp-action@a6e43c3aaf4e8e6b0b15bf34e19d71118f6b1ca7 # master
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          source: "dist/index.html,dist/assets"
          target: "~/domains/pulsewritexsolutions.com/public_html"
          strip_components: 1
          overwrite: true

      # ── POST-DEPLOY: install deps, prisma generate, restart, protect nodejs/ ───
      - name: Post-deploy setup and restart
        uses: appleboy/ssh-action@90162d1e4396c5c4b7671d60cae550a8b1ae1d0b # master
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          command_timeout: 5m
          script: |
            set +e
            export PATH=/opt/alt/alt-nodejs18/root/usr/bin:$PATH
            DOMAIN=~/domains/pulsewritexsolutions.com

            echo "=== Node version ==="
            node -v

            echo "=== Installing backend deps ==="
            cd $DOMAIN/backendnode
            npm install --omit=dev 2>&1 | tail -5

            echo "=== Prisma generate ==="
            ./node_modules/.bin/prisma generate 2>&1 | tail -5

            echo "=== DB push ==="
            ./node_modules/.bin/prisma db push --accept-data-loss 2>&1 | tail -10

            echo "=== Seeding admin ==="
            node -e "const{PrismaClient}=require('@prisma/client');const bcrypt=require('bcryptjs');const p=new PrismaClient();(async()=>{try{const h=await bcrypt.hash('EdmalaB@2025',10);const e=await p.prototypingUser.findUnique({where:{email:'pulsewritex@gmail.com'}});if(e){await p.prototypingUser.update({where:{email:'pulsewritex@gmail.com'},data:{role:'SUPER_ADMIN',password:h}});console.log('Admin updated')}else{await p.prototypingUser.create({data:{email:'pulsewritex@gmail.com',name:'PulseX Admin',password:h,role:'SUPER_ADMIN'}});console.log('Admin created')}await p.\$disconnect()}catch(e){console.error('Seed error:',e.message)}})();" 2>&1

            echo "=== Protecting nodejs/ (remove stray files) ==="
            cd $DOMAIN/nodejs
            for item in $(ls -A); do
              case "$item" in
                server.js|tmp|stderr.log) ;; # keep these
                *) rm -rf "$item"; echo "  removed: $item" ;;
              esac
            done

            echo "=== Fixing .htaccess (remove NODE_OPTIONS preload that crashes Node) ==="
            sed -i '/SetEnv NODE_OPTIONS/d' $DOMAIN/public_html/.htaccess 2>/dev/null || true
            sed -i '/\.builds/d' $DOMAIN/public_html/.htaccess 2>/dev/null || true

            echo "=== Restarting Passenger ==="
            mkdir -p $DOMAIN/nodejs/tmp
            touch $DOMAIN/nodejs/tmp/restart.txt
            mkdir -p $DOMAIN/tmp
            touch $DOMAIN/tmp/restart.txt

            echo "=== Verifying ==="
            echo "--- .htaccess ---"
            cat $DOMAIN/public_html/.htaccess
            echo "--- public_html ---"
            ls -la $DOMAIN/public_html/
            echo "--- nodejs/ ---"
            ls -la $DOMAIN/nodejs/
            echo "--- nodejs/ size ---"
            du -sh $DOMAIN/nodejs/

            echo "=== Deploy complete ==="
            exit 0

