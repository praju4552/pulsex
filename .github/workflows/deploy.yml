name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Build backend
        run: |
          cd backend-node
          npm install
          npm run build

      - name: Copy dist to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          source: "backend-node/dist/"
          target: "~/domains/pulsewritexsolutions.com/nodejs/backend-node/"
          strip_components: 1

      - name: Copy package.json to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          source: "backend-node/package.json,backend-node/package-lock.json,backend-node/prisma/"
          target: "~/domains/pulsewritexsolutions.com/nodejs/backend-node/"
          strip_components: 1

      - name: Install and setup on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          script: |
            export PATH=/opt/alt/alt-nodejs22/root/usr/bin:$PATH
            cd ~/domains/pulsewritexsolutions.com/nodejs/backend-node
            npm install --omit=dev
            ./node_modules/.bin/prisma generate
            chmod -R +x ./node_modules/.bin/
            echo "Restarting Node.js application..."
            killall -9 node || true
