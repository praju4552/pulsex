name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build backend
        run: |
          cd backend-node
          npm install
          npm run build

      # Step 1: Clean old dist on server BEFORE uploading new files
      - name: Clean old dist on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          sync: true
          script: |
            echo "=== Cleaning old dist directories ==="
            rm -rf ~/domains/pulsewritexsolutions.com/backendnode/dist
            rm -rf ~/domains/pulsewritexsolutions.com/nodejs/backend-node/dist
            rm -rf ~/domains/pulsewritexsolutions.com/backend-node/dist
            echo "=== Old dist cleaned ==="

      # Step 2: Upload new compiled backend
      - name: Deploy Root Server Bootloader
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          source: "server.js"
          target: "~/domains/pulsewritexsolutions.com/"
          overwrite: true

      - name: Deploy Backend (primary - backendnode)
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          source: "backend-node/dist,backend-node/prisma,backend-node/package.json,backend-node/package-lock.json"
          target: "~/domains/pulsewritexsolutions.com/backendnode"
          strip_components: 1
          overwrite: true

      - name: Deploy Backend (secondary - nodejs)
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          source: "backend-node/dist,backend-node/prisma,backend-node/package.json,backend-node/package-lock.json"
          target: "~/domains/pulsewritexsolutions.com/nodejs/backend-node"
          strip_components: 1
          overwrite: true

      # Step 3: Install deps, seed admin, verify auth middleware, restart
      - name: Install deps, seed admin, verify and restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          command_timeout: 15m
          sync: true
          script: |
            export PATH=/opt/alt/alt-nodejs22/root/usr/bin:$PATH
            echo "=== Installing dependencies (primary) ==="
            cd ~/domains/pulsewritexsolutions.com/backendnode
            npm install --omit=dev 2>/dev/null || true
            ./node_modules/.bin/prisma db push --accept-data-loss || true
            ./node_modules/.bin/prisma generate || true
            chmod -R +x ./node_modules/.bin/ || true
            echo "=== Installing dependencies (secondary) ==="
            cd ~/domains/pulsewritexsolutions.com/nodejs/backend-node
            npm install --omit=dev 2>/dev/null || true
            ./node_modules/.bin/prisma generate || true
            chmod -R +x ./node_modules/.bin/ || true
            echo "=== Seeding admin account ==="
            cd ~/domains/pulsewritexsolutions.com/backendnode
            node -e "const{PrismaClient}=require('@prisma/client');const bcrypt=require('bcryptjs');const p=new PrismaClient();(async()=>{try{const h=await bcrypt.hash('EdmalaB@2025',10);const e=await p.prototypingUser.findUnique({where:{email:'pulsewritex@gmail.com'}});if(e){await p.prototypingUser.update({where:{email:'pulsewritex@gmail.com'},data:{role:'SUPER_ADMIN',password:h,name:'Pulse X Admin'}});console.log('Admin updated')}else{await p.prototypingUser.create({data:{email:'pulsewritex@gmail.com',name:'Pulse X Admin',password:h,role:'SUPER_ADMIN'}});console.log('Admin created')}await p.\$disconnect()}catch(err){console.error('Seed error:',err.message)}})()" || true
            echo "=== Verifying auth middleware ==="
            for authfile in $(find ~/domains/pulsewritexsolutions.com -name "auth.js" -path "*/dist/middleware/*" 2>/dev/null); do
              echo "Checking $authfile"
              if grep -q "invalid super admin" "$authfile" || grep -q "SUPER_ADMIN_EMAILS" "$authfile"; then
                echo "OLD CODE FOUND - patching with sed"
                sed -i 's/invalid super admin account/Access denied: insufficient permissions/g' "$authfile"
                sed -i '/SUPER_ADMIN_EMAILS/d' "$authfile"
                echo "Patched $authfile"
              else
                echo "OK - $authfile is clean"
              fi
            done
            echo "=== Gerber parser fix ==="
            find ~/domains/pulsewritexsolutions.com -name "gerberParser.js" -path "*/dist/services/*" 2>/dev/null | while read f; do
              if grep -q "_x, _y, w, h" "$f"; then
                sed -i 's/var \[_x, _y, w, h\]/var [x1, y1, x2, y2]/' "$f"
                sed -i 's/const \[_x, _y, w, h\]/const [x1, y1, x2, y2]/' "$f"
                sed -i '/var \[x1, y1, x2, y2\]/a\                        var w = x2 - x1;\n                        var h = y2 - y1;' "$f"
                echo "Gerber patched: $f"
              fi
            done
            echo "=== Restarting Node.js ==="
            killall -9 node 2>/dev/null || true
            sleep 3
            echo "=== Deploy complete ==="

      # Step 4: Verify deployed code
      - name: Verify deployed code on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          sync: true
          script: |
            echo "=== Auth middleware verification ==="
            grep -c "invalid super admin" ~/domains/pulsewritexsolutions.com/backendnode/dist/middleware/auth.js 2>/dev/null && echo "FAIL: old code still present" || echo "PASS: auth.js is clean"
            grep -c "SUPER_ADMIN_EMAILS" ~/domains/pulsewritexsolutions.com/backendnode/dist/middleware/auth.js 2>/dev/null && echo "FAIL: email list still present" || echo "PASS: no email list"
            echo "=== Gerber verification ==="
            grep -n "image.size" ~/domains/pulsewritexsolutions.com/backendnode/dist/services/gerberParser.js 2>/dev/null || echo "gerberParser not found at backendnode"
            echo "=== server-crash.log ==="
            cat ~/domains/pulsewritexsolutions.com/server-crash.log 2>/dev/null || echo "No crash log"
            echo "=== Directory listing ==="
            ls -la ~/domains/pulsewritexsolutions.com/backendnode/dist/middleware/ 2>/dev/null || echo "middleware dir not found"

      # Step 5: Build and deploy frontend
      - name: Build Frontend
        env:
          VITE_API_URL: https://api.pulsewritexsolutions.com
          VITE_GOOGLE_CLIENT_ID: 835363988192-jr2ftrbtlklhui007gosnstjqca77m71.apps.googleusercontent.com
          VITE_RAZORPAY_KEY_ID: rzp_live_SaYqVVu3DybnJx
        run: |
          npm install
          npm run build

      - name: Deploy Frontend to Hostinger
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          source: "dist/*,dist/.htaccess"
          target: "~/domains/pulsewritexsolutions.com/public_html"
          strip_components: 1
