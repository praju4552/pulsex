name: Build PulseX

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── Verify secrets exist before wasting build time ──
      - name: Verify deployment secrets
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          SSH_PASS: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
        run: |
          echo "SSH_HOST length: ${#SSH_HOST}"
          echo "SSH_USER length: ${#SSH_USER}"
          echo "SSH_PASS length: ${#SSH_PASS}"
          if [ -z "$SSH_HOST" ] || [ -z "$SSH_USER" ] || [ -z "$SSH_PASS" ]; then
            echo "::error::One or more deployment secrets are empty!"
            echo "Required secrets: HOSTINGER_SSH_HOST, HOSTINGER_SSH_USER, HOSTINGER_SSH_PASSWORD"
            exit 1
          fi
          echo "✅ All secrets are set."

      # ── Build Backend ──
      - name: Build backend
        run: |
          cd backend-node
          npm install
          npm run build

      # ── Generate Prisma client (linux-x64, same as Hostinger) ──
      - name: Generate Prisma client
        run: |
          cd backend-node
          npx prisma generate

      # ── Build Frontend ──
      - name: Build Frontend
        env:
          VITE_API_URL: https://api.pulsewritexsolutions.com
          VITE_GOOGLE_CLIENT_ID: 835363988192-jr2ftrbtlklhui007gosnstjqca77m71.apps.googleusercontent.com
          VITE_RAZORPAY_KEY_ID: rzp_live_SaYqVVu3DybnJx
        run: |
          npm install
          npm run build

      # ── Prepare deployment payload ──
      - name: Prepare deployment files
        run: |
          mkdir -p deploy/backendnode/dist
          mkdir -p deploy/backendnode/prisma
          mkdir -p deploy/backendnode/node_modules
          mkdir -p deploy/public_html
          mkdir -p deploy/tmp

          # Backend compiled code
          cp -r backend-node/dist/* deploy/backendnode/dist/
          cp -r backend-node/prisma/* deploy/backendnode/prisma/
          cp backend-node/package.json deploy/backendnode/
          cp backend-node/package-lock.json deploy/backendnode/

          # Prisma generated client (built for linux-x64 on this runner)
          cp -r backend-node/node_modules/.prisma deploy/backendnode/node_modules/
          cp -r backend-node/node_modules/@prisma deploy/backendnode/node_modules/

          # Frontend
          cp -r dist/* deploy/public_html/
          [ -f dist/.htaccess ] && cp dist/.htaccess deploy/public_html/ || true

          # Server bootloader
          [ -f server.js ] && cp server.js deploy/ || true

          # Restart marker
          touch deploy/tmp/restart.txt

          echo "=== Deployment payload ==="
          du -sh deploy/*/

      # ── Deploy via FTP (bypasses Hostinger SSH firewall) ──
      # NOTE: Uses same credentials as SSH. Hostinger shares user/pass
      # across SSH (port 65002) and FTP (port 21).
      # If new npm packages are added, run deploy-to-hostinger.ps1 manually.
      - name: Deploy to Hostinger via FTP
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp

          # Create lftp script for reliable deployment
          cat > /tmp/ftp_deploy.sh << 'SCRIPT'
          #!/bin/bash
          set -e

          REMOTE_BASE="domains/pulsewritexsolutions.com"

          lftp -u "${FTP_USER},${FTP_PASS}" "ftp://${FTP_HOST}" << EOF
            set ssl:verify-certificate no
            set ftp:ssl-allow yes
            set net:timeout 60
            set net:max-retries 5
            set net:reconnect-interval-base 5
            set mirror:use-pget-n 5

            echo "=== Uploading backend dist ==="
            mirror -R --verbose --delete --no-perms --parallel=10 deploy/backendnode/dist/ ${REMOTE_BASE}/backendnode/dist/

            echo "=== Uploading Prisma schema ==="
            mirror -R --verbose --no-perms --parallel=5 deploy/backendnode/prisma/ ${REMOTE_BASE}/backendnode/prisma/

            echo "=== Uploading Prisma client ==="
            mirror -R --verbose --no-perms --parallel=10 deploy/backendnode/node_modules/.prisma/ ${REMOTE_BASE}/backendnode/node_modules/.prisma/
            mirror -R --verbose --no-perms --parallel=10 deploy/backendnode/node_modules/@prisma/ ${REMOTE_BASE}/backendnode/node_modules/@prisma/

            echo "=== Uploading package files ==="
            put -O ${REMOTE_BASE}/backendnode/ deploy/backendnode/package.json
            put -O ${REMOTE_BASE}/backendnode/ deploy/backendnode/package-lock.json

            echo "=== Uploading frontend ==="
            mirror -R --verbose --delete --no-perms --parallel=10 deploy/public_html/ ${REMOTE_BASE}/public_html/

            echo "=== Uploading server bootloader ==="
            put -O ${REMOTE_BASE}/ deploy/server.js || true

            echo "=== Triggering restart ==="
            mkdir -p ${REMOTE_BASE}/tmp
            put -O ${REMOTE_BASE}/tmp/ deploy/tmp/restart.txt

            echo "✅ FTP deployment complete!"
            bye
          EOF
          SCRIPT

          chmod +x /tmp/ftp_deploy.sh
          bash /tmp/ftp_deploy.sh
