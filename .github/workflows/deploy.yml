name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Setup Node
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version: '18'

      # Build everything on the CI runner (NOT on Hostinger)
      - name: Build backend + generate Prisma binary for Hostinger
        run: |
          cd backend-node
          npm install
          npm run build
          # Generate Prisma client with the binary engine for debian-openssl-1.1.x (Hostinger)
          npx prisma generate
          # Install prod deps only (for deployment)
          npm install --omit=dev
          echo "=== Build complete ==="
          ls -la dist/ | head -10
          ls node_modules/@prisma/client/ | head -5

      # Step 1: Clean old backend on server
      - name: Clean old backend on server
        uses: appleboy/ssh-action@90162d1e4396c5c4b7671d60cae550a8b1ae1d0b # master
        continue-on-error: true
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          script: |
            set +e
            rm -rf ~/domains/pulsewritexsolutions.com/backendnode/dist
            rm -rf ~/domains/pulsewritexsolutions.com/backendnode/node_modules
            echo "=== Cleaned old backend ==="

      # Step 2: Upload server.js bootloader
      - name: Deploy Root Server Bootloader
        uses: appleboy/scp-action@a6e43c3aaf4e8e6b0b15bf34e19d71118f6b1ca7 # master
        continue-on-error: true
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          source: "server.js"
          target: "~/domains/pulsewritexsolutions.com/"
          overwrite: true

      # Step 3: Upload compiled backend dist
      - name: Deploy Backend dist and prisma schema
        uses: appleboy/scp-action@a6e43c3aaf4e8e6b0b15bf34e19d71118f6b1ca7 # master
        continue-on-error: true
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          source: "backend-node/dist,backend-node/prisma,backend-node/package.json"
          target: "~/domains/pulsewritexsolutions.com/backendnode"
          strip_components: 1
          overwrite: true

      # Step 4: Upload pre-built node_modules (NO npm install on Hostinger)
      - name: Deploy node_modules to Hostinger
        uses: appleboy/scp-action@a6e43c3aaf4e8e6b0b15bf34e19d71118f6b1ca7 # master
        continue-on-error: true
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          source: "backend-node/node_modules"
          target: "~/domains/pulsewritexsolutions.com/backendnode"
          strip_components: 1
          overwrite: true

      # Step 5: Seed admin and restart via Passenger (lightweight - no npm!)
      - name: Seed admin and restart Passenger
        uses: appleboy/ssh-action@90162d1e4396c5c4b7671d60cae550a8b1ae1d0b # master
        continue-on-error: true
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          script: |
            set +e
            export PATH=/opt/alt/alt-nodejs22/root/usr/bin:$PATH
            cd ~/domains/pulsewritexsolutions.com/backendnode
            echo "=== Running DB push (schema sync) ==="
            ./node_modules/.bin/prisma db push --accept-data-loss 2>&1 | tail -10
            echo "=== Seeding admin ==="
            node -e "const{PrismaClient}=require('@prisma/client');const bcrypt=require('bcryptjs');const p=new PrismaClient();(async()=>{try{const h=await bcrypt.hash('EdmalaB@2025',10);const e=await p.prototypingUser.findUnique({where:{email:'pulsewritex@gmail.com'}});if(e){await p.prototypingUser.update({where:{email:'pulsewritex@gmail.com'},data:{role:'SUPER_ADMIN',password:h}});console.log('Admin updated')}else{await p.prototypingUser.create({data:{email:'pulsewritex@gmail.com',name:'PulseX Admin',password:h,role:'SUPER_ADMIN'}});console.log('Admin created')}await p.\$disconnect()}catch(e){console.error('Seed error:',e.message)}})();" 2>&1
            echo "=== Restarting Passenger ==="
            mkdir -p ~/domains/pulsewritexsolutions.com/tmp
            touch ~/domains/pulsewritexsolutions.com/tmp/restart.txt
            echo "=== Backend done ==="
            exit 0

      # Step 6: Build and deploy frontend
      - name: Build Frontend
        env:
          VITE_API_URL: https://api.pulsewritexsolutions.com
          VITE_GOOGLE_CLIENT_ID: 835363988192-jr2ftrbtlklhui007gosnstjqca77m71.apps.googleusercontent.com
          VITE_RAZORPAY_KEY_ID: rzp_live_SaYqVVu3DybnJx
        run: |
          npm install
          npm run build
          echo "=== Frontend built ==="
          ls dist/

      - name: Deploy Frontend to Hostinger
        uses: appleboy/scp-action@a6e43c3aaf4e8e6b0b15bf34e19d71118f6b1ca7 # master
        continue-on-error: true
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          source: "dist/*"
          target: "~/domains/pulsewritexsolutions.com/public_html"
          strip_components: 1
          overwrite: true

      # Step 7: Fix .htaccess for SPA routing
      - name: Fix .htaccess for SPA routing
        uses: appleboy/ssh-action@90162d1e4396c5c4b7671d60cae550a8b1ae1d0b # master
        continue-on-error: true
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          script: |
            set +e
            printf 'Options -MultiViews\nRewriteEngine On\nRewriteCond %%{REQUEST_FILENAME} !-f\nRewriteRule ^ index.html [QSA,L]\n' > ~/domains/pulsewritexsolutions.com/public_html/.htaccess
            echo "=== .htaccess OK ==="
            ls -la ~/domains/pulsewritexsolutions.com/public_html/ | head -10
            exit 0
